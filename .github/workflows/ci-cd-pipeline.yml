name: CI/CD Pipeline com CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codeql-analysis:
    name: "Análise CodeQL"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: .github/codeql-config.yml
      - uses: github/codeql-action/analyze@v3

  tests:
    name: "Testes Automatizados"
    runs-on: ubuntu-latest
    needs: codeql-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: flake8 main.py
      - run: pytest tests/

  deploy-stage:
    name: "Deploy para Stage"
    runs-on: ubuntu-latest
    needs: [codeql-analysis, tests]
    environment: stage
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy simulado para o ambiente stage com sucesso!"
